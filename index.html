<!doctype html>
<html>
    <head>
        <link rel="stylesheet" href="styles.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="container">
            <div>
                <h1>HOME</h1>
                <div class="boxscore" id="home-boxscore">0</div>
                <div class="row">
                    <button id="btn-home-one">+1</button>
                    <button id="btn-home-two">+2</button>
                    <button id="btn-home-three">+3</button>
                </div>
            </div>
            <h1 id="hypen">-</h1>
            <div>
                <h1>AWAY</h1>
                <div class="boxscore" id="away-boxscore">0</div>
                <div class="row">
                    <button id="btn-away-one">+1</button>
                    <button id="btn-away-two">+2</button>
                    <button id="btn-away-three">+3</button>
                </div>
            </div>
        </div>
        <script src="index.js"></script>
    </body>
</html>
